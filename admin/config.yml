backend:
  name: git-gateway
  branch: main

site_url: https://bloomsbyvisaka.com
display_url: https://bloomsbyvisaka.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "garlands"
    label: "Garlands & Products"
    folder: "_data/garlands"
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Flowers / Material", name: "flowers", widget: "string", hint: "e.g. Red rose & baby's breath" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Wedding", value: "Wedding" }
          - { label: "Bridal", value: "Bridal" }
          - { label: "Pooja & Festival", value: "Pooja & Festival" }
          - { label: "Fragrant Soaps", value: "Fragrant Soaps" }
          - { label: "Condolence", value: "Condolence" }
      - { label: "Description", name: "desc", widget: "text" }
      - { label: "Price (optional)", name: "price", widget: "string", required: false }
      - { label: "Product Photo", name: "img", widget: "image", required: false }
      - { label: "Available", name: "available", widget: "boolean", default: true }

  - name: "faq"
    label: "FAQ"
    folder: "_data/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer", name: "answer", widget: "text" }
      - { label: "Order", name: "order", widget: "number", default: 1 }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact Info"
        name: "contact"
        file: "_data/settings/contact.json"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
